name: 🚀 Deploy to AKS

on:
  workflow_call:
    inputs:
      image_tag:
        description: Image tag to deploy to Kubernetes
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy to Kubernetes
        required: true
        type: string

jobs:
  deploy:
    name: ☸️ Deploy to AKS
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🛠️ Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: 🔐 Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          cluster-name: ${{ secrets.CLUSTER_NAME }}

      - name: 🌐 Discover API URL
        run: |
          API_IP=""
          for attempt in $(seq 1 30); do
            API_IP=$(kubectl get svc sensitive-data-api -n sensitive-data-app -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [ -n "$API_IP" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$API_IP" ]; then
            echo "API external IP not available"
            exit 1
          fi

          echo "API_URL=http://$API_IP/api" >> "$GITHUB_ENV"

      - name: 🏷️ Replace image tags in manifests
        run: |
          sed -i "s|yourregistry.azurecr.io|${{ secrets.ACR_LOGIN_SERVER }}|g" k8s/*.yaml
          sed -i "s|__IMAGE_TAG__|${IMAGE_TAG}|g" k8s/api-deployment.yaml k8s/web-deployment.yaml
          sed -i "s|__API_URL__|${API_URL}|g" k8s/web-deployment.yaml

      - name: 🚢 Deploy to AKS
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/sensitive-data-api -n sensitive-data-app --timeout=180s
          kubectl rollout status deployment/sensitive-data-web -n sensitive-data-app --timeout=180s

      # NOTE: This deployment is intentionally simple for demo purposes.
      # In production you would use proper GitOps (e.g., Flux or Argo CD),
      # image scanning in the CI pipeline, and an admission controller
      # (e.g., Azure Policy / Gatekeeper) to enforce security policies.
