name: ♻️ Reusable Docker Build

on:
  workflow_call:
    inputs:
      image_name:
        description: Image name to publish in ACR
        required: true
        type: string
      build_context:
        description: Docker build context
        required: true
        type: string
      image_tag:
        description: Image tag to publish
        required: true
        type: string

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  build-and-push:
    name: 🐳 Build and Push image
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6.0.2

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: 🔐 Log in to Azure Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}

      - name: 🏗️ Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v7.0.0
        with:
          context: ${{ inputs.build_context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # GitHub-specific attestation stored in GitHub's attestation store
      # This complements Docker attestations and enables `gh attestation verify`
      - name: Generate artifact attestation 📜
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}@${{ steps.build-push.outputs.digest }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

      - name: Image digest 🔍
        if: github.event_name != 'pull_request'
        run: echo "Image pushed successfully to ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}@${{ steps.build-push.outputs.digest }}"

      - name: Create artifact metadata storage record 📝
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -n --arg artifactName "${{ inputs.image_name }}" --arg artifactVersion "${{ inputs.image_tag }}" --arg artifactDigest "${{ steps.build-push.outputs.digest }}" --arg registryUrl "https://${{ secrets.ACR_LOGIN_SERVER }}/" '{"name": $artifactName, "digest": $artifactDigest, "version": $artifactVersion, "registry_url": $registryUrl, "repository": "${{ inputs.image_name }}"}' > create-record.json
          gh api -X POST orgs/${{ github.repository_owner }}/artifacts/metadata/storage-record --input create-record.json
        shell: bash


      - name: 🔒 Run Microsoft Security DevOps Analysis
        id: msdo
        uses: microsoft/security-devops-action@v1.12.0

      - name: 📤 Upload alerts to Security tab
        if: always() && steps.msdo.outputs.sarifFile != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}


      - name: Output image details 📋
        run: |
          echo "## Docker Image Build Summary 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: \`${{ secrets.ACR_LOGIN_SERVER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.build-push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Features 🔒" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SBOM (Software Bill of Materials) generated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Provenance attestation included" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build artifact attestation generated" >> $GITHUB_STEP_SUMMARY
