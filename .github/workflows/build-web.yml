name: 🌐 Build & Push Web

on:
  push:
    branches: [main]
    paths:
      - 'src/web/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/web/**'
  workflow_dispatch:

jobs:
  validate-build:
    name: 🧪 Validate Web image build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Web image without push
        uses: docker/build-push-action@v6
        with:
          context: ./src/web
          push: false
          tags: sensitive-data-web:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push:
    name: 🐳 Build and Push Web image
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/build-image-reusable.yml
    with:
      image_name: sensitive-data-web
      build_context: ./src/web
    secrets: inherit
