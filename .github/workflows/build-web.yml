name: 🌐 Build & Push Web

on:
  push:
    branches: [main]
    paths:
      - 'src/web/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/web/**'
  workflow_dispatch:

env:
  IMAGE_NAME: sensitive-data-web

jobs:
  build-and-push:
    name: 🐳 Build and Push Web image
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 🏗️ Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
                       ./src/web

      - name: 📤 Push Docker image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # NOTE: Intentionally NO image scanning step
      # Defender for Containers will scan images pushed to ACR
