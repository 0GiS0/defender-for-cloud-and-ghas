name: 🌐 Build & Push Web

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/web/**'
  workflow_dispatch:

jobs:
  validate-build:
    name: 🧪 Validate Web image build
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6.0.2

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: 🏗️ Build Web image without push
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./src/web
          push: false
          tags: sensitive-data-web:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'manual-validation' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
