name: 🧱 Build & Push API

on:
  push:
    branches: [main]
    paths:
      - 'src/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/api/**'
  workflow_dispatch:

jobs:
  validate-build:
    name: 🧪 Validate API image build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build API image without push
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: false
          tags: sensitive-data-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push:
    name: 🐳 Build and Push API image
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/build-image-reusable.yml
    with:
      image_name: sensitive-data-api
      build_context: ./src/api
    secrets: inherit
