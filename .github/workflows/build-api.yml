name: 🧱 Build & Push API

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/api/**'
  workflow_dispatch:

jobs:
  validate-build:
    name: 🧪 Validate API image build
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build API image without push
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: false
          tags: sensitive-data-api:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'manual-validation' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
